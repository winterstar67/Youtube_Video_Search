<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Search & Storage System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 60px;
            max-width: 800px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-align: center;
        }
        p {
            color: #666;
            margin-bottom: 40px;
            text-align: center;
            font-size: 1.1em;
        }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 40px;
        }
        .feature-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }
        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .feature-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .feature-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .feature-desc {
            font-size: 0.95em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Search & Storage System</h1>
        <p>YouTube 영상 자막 기반 의미론적 검색 및 저장 시스템</p>

        <div class="features">
            <a href="/search" class="feature-card">
                <div class="feature-icon">🔍</div>
                <div class="feature-title">검색 기능</div>
                <div class="feature-desc">VectorDB에서 의미론적 검색을 수행합니다</div>
            </a>

            <a href="/store" class="feature-card">
                <div class="feature-icon">💾</div>
                <div class="feature-title">저장 기능</div>
                <div class="feature-desc">YouTube 영상 자막을 VectorDB에 저장합니다</div>
            </a>
        </div>
    </div>
</body>
</html>
